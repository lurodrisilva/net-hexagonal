# k6-operator TestRun manifest.
# Prereq: k6-operator installed in-cluster
#   (https://github.com/grafana/k6-operator).
#
# Mount the load script from a ConfigMap so the operator's runner pods pick
# it up without needing a custom image.
#
# Usage:
#   kubectl create configmap hex-scaffold-loadtest \
#     --from-file=rest-api-loadtest.js=tests/loadtest/k6/rest-api-loadtest.js
#   kubectl apply -f tests/loadtest/k6/testrun.yaml
#   kubectl get testruns -w
#   kubectl logs -l k6_cr=hex-scaffold-rest-loadtest -f
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: hex-scaffold-rest-loadtest
spec:
  # Distribute the scenario across 6 k6 runners.
  parallelism: 6
  script:
    configMap:
      name: hex-scaffold-loadtest
      file: rest-api-loadtest-pgsql-pp.js
  runner:
    # Pin runner pods to the dedicated load-generation nodepool so the k6
    # workload doesn't compete for CPU with the system nodepool. AKS labels
    # every node with `agentpool=<nodepool-name>`; nodepool2 has no taints,
    # so a plain nodeSelector is enough — no tolerations required.
    nodeSelector:
      agentpool: nodepool3
    env:
      - name: BASE_URL
        value: "http://hex-scaffold.default.svc:80"
    # nodepool3 nodes are Standard_D2s_v6 (2 vCPU); after AKS system DaemonSets
    # take ~530m, ~1370m is allocatable per node. With requests.cpu=750m only
    # 1 runner fits per node, so parallelism>nodes left runners stuck Pending
    # with "0/N nodes available: insufficient cpu". Dropping to 600m gives 2
    # runners per node and lets the configured parallelism actually schedule.
    resources:
      requests: { cpu: 600m,  memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi  }
  arguments: >-
    --summary-export=/tmp/summary.json
    --tag testid=hex-scaffold-rest-loadtest
  # Uncomment to ship metrics directly to a Prometheus remote_write target
  # such as Azure Monitor managed Prometheus.
  # arguments: >-
  #   --out experimental-prometheus-rw
  #   --tag testid=hex-scaffold-rest-loadtest
