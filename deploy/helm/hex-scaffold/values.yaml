# ---------------------------------------------------------------------------
# hex-scaffold / values.yaml
#
# The chart is opinionated: pick ONE inbound, ONE outbound, ONE primary
# persistence store. Redis is optional and only valid with PostgreSQL.
# The "features" block below is the single source of truth and is rendered
# verbatim into the ConfigMap consumed by the application.
# ---------------------------------------------------------------------------

image:
  repository: ghcr.io/lurodrisilva/net-hexagonal
  tag: "latest"                       # defaults to .Chart.AppVersion
  # `Always` because `:latest` is a mutable tag — IfNotPresent would let nodes
  # keep serving a stale cached digest after a new image is pushed. Override to
  # IfNotPresent when pinning to an immutable semver or sha tag.
  pullPolicy: Always
imagePullSecrets: []

replicaCount: 2
nameOverride: ""
fullnameOverride: ""

# -- Adapter / persistence selection (drives ConfigMap + conditional templates).
#    Allowed:
#      inbound:     rest | kafka
#      outbound:    rest | kafka
#      persistence: postgres | mongo
#      redis:       true | false   (only legal when persistence=postgres)
features:
  inbound: rest
  outbound: kafka
  persistence: postgres
  redis: true

# -- Container-level env overrides (merged after ConfigMap/Secret refs).
env: []

# -- Connection strings / secrets referenced by the app. Prefer external
#    secret management (CSI driver, ExternalSecrets, Sealed Secrets) in prod;
#    the values here feed a Secret template suitable for local / demo use.
secrets:
  # Postgres connection string (used when features.persistence=postgres)
  postgresConnectionString: "Host=pgsql-pp.private.postgres.database.azure.com;Database=postgres;Username=adminpg;Password=$kFFb23j@%*_*);Port=5432"
  # Mongo connection string  (used when features.persistence=mongo)
  mongoConnectionString: "mongodb://mongo:27017"
  # Redis connection string  (used when features.redis=true)
  redisConnectionString: "redis:6379"
  # Kafka bootstrap           (used when any features.*=kafka)
  kafkaBootstrapServers: "kafka-bootstrap.kafka.svc:9092"
  kafkaConsumerGroupId: "hex-scaffold-group"
  # External REST API the outbound HTTP adapter targets (always registered)
  externalApiBaseUrl: "https://httpbin.org"
  # Azure Application Insights connection string. Leave empty to disable the
  # Azure Monitor exporter (the OTLP pipeline still runs). Inject via a real
  # SecretProviderClass / ExternalSecret in production.
  appInsightsConnectionString: ""

application:
  port: 8080
  # The `MongoDB__DatabaseName` env var; ignored when persistence=postgres.
  mongoDatabaseName: "hex-scaffold"
  # ASPNETCORE_ENVIRONMENT
  environment: Production

# -- WireMock — in-cluster HTTP API mock used by the outbound REST adapter
#    (IExternalApiClient). When enabled, ExternalApi__BaseUrl is rewritten to
#    point at the WireMock service so the app hits a deterministic mock with
#    a baked-in response delay (default 300ms) instead of an external host.
#    The skill `wiremock-api-mocks` documents the broader platform-tier shared-
#    instance pattern; here we ship a self-contained, per-release WireMock for
#    scaffold/demo use.
wiremock:
  enabled: true
  replicaCount: 1
  image:
    repository: wiremock/wiremock
    # Pinned to an immutable patched tag because the floating "3-alpine" alias
    # was returning 404 from Docker Hub in some pull contexts.
    tag: "3.13.2-3-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Global response delay (milliseconds) injected into every stub's response
  # at render time. Lets the application's HttpClient resilience pipeline
  # observe a realistic latency without per-stub bookkeeping.
  fixedDelayMs: 300
  # Stub mappings rendered as individual files into the WireMock ConfigMap and
  # loaded at startup. The fixedDelayMs above is merged into each `response`
  # automatically — do not duplicate it here. Add more entries as the
  # application grows; each becomes /home/wiremock/mappings/<key>.json.
  mappings:
    catchall:
      request:
        method: ANY
        urlPattern: ".*"
      response:
        status: 200
        headers:
          Content-Type: "application/json"
        jsonBody:
          source: "wiremock"
          message: "stubbed by hex-scaffold helm chart"

# -- Database migrations (PostgreSQL only). When enabled, a Helm pre-install /
#    pre-upgrade Job runs `dotnet ef database update` before the Deployment
#    rolls. No-op when persistence=mongo.
migrations:
  enabled: true
  image:
    # Uses the same image as the app. The runtime image ships a self-contained
    # EF migration bundle at /app/efbundle (produced by `dotnet ef migrations
    # bundle --self-contained` in the Dockerfile build stage), so the chiseled
    # runtime can run migrations without a shell or the .NET SDK.
    repository: ghcr.io/lurodrisilva/net-hexagonal
    tag: ""                     # defaults to .Chart.AppVersion
    # Same rationale as image.pullPolicy above — the migration Job references
    # the mutable `:latest` tag by default, so force a re-pull on every run.
    pullPolicy: Always
  backoffLimit: 3
  activeDeadlineSeconds: 600

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hex-scaffold.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1654              # matches the chiseled .NET image's APP_UID
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser: 1654
  capabilities:
    drop: [ALL]

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# -- OpenTelemetry / Azure Monitor.
#    The application already carries the Azure Monitor OTel exporter; setting
#    appInsightsConnectionString above (via Secret) activates ingest. These
#    knobs tune the OTLP side (e.g. when running a local collector).
observability:
  otlp:
    endpoint: "http://otel-collector.observability.svc:4318"
  # Tornadoes the four golden signals (latency/traffic/errors/saturation)
  # into the Application Insights "customMetrics" table via the runtime and
  # HTTP/ASP.NET Core instrumentations that are wired in code.
