# Secret — connection strings and the App Insights connection string.
# DEMO / DEV ONLY. In production, replace this template with references to a
# SecretProviderClass (Azure Key Vault CSI driver) or ExternalSecrets.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hex-scaffold.fullname" . }}
  labels:
    {{- include "hex-scaffold.labels" . | nindent 4 }}
  # Rendered as a pre-install/pre-upgrade hook (weight -10) so it lands BEFORE
  # the migration Job (weight -5), which envFroms it. before-hook-creation
  # leaves the object in place so the regular Deployment can also mount it,
  # and `helm uninstall` still removes it (no resource-policy=keep).
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{- if eq .Values.features.persistence "postgres" }}
  ConnectionStrings__PostgreSql: {{ .Values.secrets.postgresConnectionString | quote }}
  {{- end }}
  {{- if eq .Values.features.persistence "mongo" }}
  MongoDB__ConnectionString: {{ .Values.secrets.mongoConnectionString | quote }}
  {{- end }}
  {{- if .Values.features.redis }}
  Redis__ConnectionString: {{ .Values.secrets.redisConnectionString | quote }}
  {{- end }}
  {{- if or (eq .Values.features.inbound "kafka") (eq .Values.features.outbound "kafka") }}
  Kafka__BootstrapServers: {{ .Values.secrets.kafkaBootstrapServers | quote }}
  {{- end }}
  # Activates the Azure Monitor OTel exporter in code when non-empty.
  APPLICATIONINSIGHTS_CONNECTION_STRING: {{ .Values.secrets.appInsightsConnectionString | quote }}
