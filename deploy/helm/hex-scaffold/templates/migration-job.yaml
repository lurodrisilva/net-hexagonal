{{- if and .Values.migrations.enabled (eq .Values.features.persistence "postgres") -}}
# EF Core schema migration — runs as a Helm pre-install / pre-upgrade hook so
# the Deployment only starts once `dotnet ef database update` completes.
# Idempotent: EF's __EFMigrationsHistory table records applied migrations.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hex-scaffold.fullname" . }}-migrate
  labels:
    {{- include "hex-scaffold.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "hex-scaffold.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        fsGroup: 1654
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "hex-scaffold.migrationImage" . }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1654
            capabilities: { drop: [ALL] }
          # The runtime image is chiseled (no shell, no SDK) — invoke the
          # self-contained EF migration bundle baked in at build time. It reads
          # ConnectionStrings__PostgreSql from the Secret via envFrom through
          # the startup project's IConfiguration (no connection string on the
          # command line → no `ps` leakage).
          command: ["/app/efbundle"]
          envFrom:
            - configMapRef:
                name: {{ include "hex-scaffold.fullname" . }}
            - secretRef:
                name: {{ include "hex-scaffold.fullname" . }}
{{- end }}
