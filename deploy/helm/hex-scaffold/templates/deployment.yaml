apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hex-scaffold.fullname" . }}
  labels:
    {{- include "hex-scaffold.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hex-scaffold.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll on ConfigMap/Secret changes without bumping image tag.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hex-scaffold.selectorLabels" . | nindent 8 }}
        # Component label disambiguates the application pods from sibling
        # deployments rendered by the same release (e.g. WireMock) that share
        # the same `name` + `instance` selectorLabels. The matching label on
        # the Service spec.selector prevents the Service from round-robining
        # /samples traffic into a WireMock pod when both are Ready.
        # NOTE: deliberately NOT added to spec.selector.matchLabels above —
        # that field is immutable on existing Deployments and changing it
        # would break helm upgrade against any release installed pre-fix.
        app.kubernetes.io/component: api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "hex-scaffold.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.application.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "hex-scaffold.fullname" . }}
            - secretRef:
                name: {{ include "hex-scaffold.fullname" . }}
          env:
            # Per-pod App Insights "Cloud role instance" — pulled from the
            # downward API so each replica is distinguishable on the
            # Application Map. The .NET app reads this in
            # ObservabilityConfig.cs and stamps it as the OTel
            # `service.instance.id` resource attribute.
            - name: OTEL_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # readOnlyRootFilesystem=true requires a writable /tmp for .NET.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
